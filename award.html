<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1"
>

<title>
虹学夏季野球大会｜表彰状メーカー
</title>

<style>

:root{
  --navy:#05284d;
  --navy2:#001a35;
  --red:#b71924;
  --gold:#bd8b25;
  --paper:#fffdf5;
  --line:#d9dee6;
  --bg:#eef1f5;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Segoe UI",
  "Noto Sans JP",
  sans-serif;

  color:#15202b;
}

header{
  background:var(--navy);
  color:#fff;

  padding:14px 20px;

  font-weight:800;
  font-size:20px;
}

main{
  max-width:1500px;

  margin:auto;
  padding:16px;

  display:grid;

  grid-template-columns:
  330px minmax(0,1fr);

  gap:16px;
}

.panel{
  background:#fff;

  border:
  1px solid var(--line);

  border-radius:12px;

  padding:16px;

  box-shadow:
  0 2px 8px #0000000a;
}

h2{
  margin-top:0;
}

label{
  display:block;

  font-weight:700;

  margin-top:10px;
}

select,
input{
  width:100%;

  padding:11px;

  border:
  1px solid #cbd3dd;

  border-radius:8px;

  font:inherit;

  margin:6px 0;
}

button{
  width:100%;

  border:0;

  border-radius:8px;

  padding:12px 16px;

  font-weight:800;

  cursor:pointer;

  margin-top:10px;
}

.primary{
  background:var(--red);
  color:#fff;
}

.secondary{
  background:var(--navy);
  color:#fff;
}

.small{
  font-size:13px;

  color:#66717d;

  line-height:1.6;
}

.preview-wrap{
  overflow:auto;

  display:grid;

  place-items:center;
}


/* =========================
   表彰状
========================= */

#certificate{

  width:1120px;

  height:792px;

  position:relative;

  overflow:hidden;

  background:var(--paper);

  color:var(--navy2);

  border:
  18px solid var(--navy2);

  padding:
  28px 42px;

  font-family:
  "Yu Mincho",
  "Hiragino Mincho ProN",
  "Noto Serif JP",
  serif;

}


#certificate:before{

  content:"";

  position:absolute;

  inset:12px;

  border:
  4px solid var(--gold);

  pointer-events:none;

}


#certificate:after{

  content:"";

  position:absolute;

  inset:22px;

  border:
  1px solid var(--gold);

  pointer-events:none;

}


/* =========================
   コーナー
========================= */

.corner{

  position:absolute;

  width:165px;

  height:165px;

  background:var(--red);

  z-index:0;

}


.corner.tl{

  left:-80px;

  top:-80px;

  transform:
  rotate(45deg);

  border-right:
  8px solid var(--gold);

}


.corner.br{

  right:-80px;

  bottom:-80px;

  transform:
  rotate(45deg);

  border-left:
  8px solid var(--gold);

}


/* =========================
   内容
========================= */

.content{

  position:relative;

  z-index:1;

  height:100%;

  display:flex;

  flex-direction:column;

  align-items:center;

  text-align:center;

}


.crown{

  font-size:60px;

  color:var(--gold);

  line-height:1;

  margin-top:5px;

}


.title{

  font-size:68px;

  letter-spacing:.18em;

  margin:
  5px 0 8px;

  font-weight:700;

}


.award{

  font-size:37px;

  letter-spacing:.18em;

  margin:0;

  color:#15202b;

}


.laurel{

  color:var(--gold);

  font-size:31px;

  letter-spacing:.15em;

}


.recipient{

  font-size:50px;

  font-weight:700;

  letter-spacing:.08em;

  margin:
  14px 0 10px;

  padding:
  0 55px 8px;

  border-bottom:
  2px solid var(--gold);

}


.bodytext{

  font-size:23px;

  line-height:2;

  letter-spacing:.06em;

  max-width:820px;

  white-space:pre-line;

  margin:
  8px auto;

}


.tournament{

  margin-top:auto;

  font-family:
  Georgia,
  "Times New Roman",
  serif;

  font-size:25px;

  font-weight:700;

  letter-spacing:.08em;

}


.date{

  font-size:22px;

  margin-top:22px;

  letter-spacing:.12em;

}


.issuer{

  font-size:19px;

  margin-top:8px;

}


.medal{

  position:absolute;

  right:75px;

  bottom:55px;

  width:115px;

  height:115px;

  border-radius:50%;

  background:var(--navy2);

  border:
  10px double var(--gold);

  display:grid;

  place-items:center;

  color:var(--gold);

  font-size:43px;

  font-family:sans-serif;

}


/* =========================
   スマホ
========================= */

@media(max-width:900px){

  main{

    grid-template-columns:
    1fr;

  }


  .preview-wrap{

    justify-content:start;

  }


  #certificate{

    transform-origin:
    top left;

  }

}

</style>

</head>


<body>


<header>

⚾ 虹学夏季野球大会　表彰状メーカー

</header>


<main>


<!-- =========================
     設定
========================= -->


<section class="panel">


<h2>
表彰状設定
</h2>


<label>
表彰項目
</label>


<select id="awardType">

<option value="winner">
優勝
</option>

<option value="teamMvp">
チームMVP
</option>

<option value="tournamentMvp">
大会MVP
</option>

<option value="hrKing">
本塁打王
</option>

</select>


<label id="recipientLabel">
チーム名
</label>


<input
id="recipientInput"
value="RED EAGLES"
placeholder="チーム名または選手名"
>


<label>
年月日
</label>


<input
id="dateInput"
type="date"
value="2026-07-11"
>


<label>
大会名
</label>


<input
id="tournamentInput"
value="NIJIGAKU SUMMER BASEBALL TOURNAMENT 2026"
>


<button
id="download"
class="primary"
>

PNG画像として保存

</button>


<button
id="reset"
class="secondary"
>

サンプルに戻す

</button>


<p class="small">

入力内容は表彰状へリアルタイムで反映されます。

PNG保存時は表彰状部分のみを書き出します。

</p>


</section>



<!-- =========================
     表彰状
========================= -->


<section class="panel preview-wrap">


<div id="certificate">


<div class="corner tl">
</div>


<div class="corner br">
</div>


<div class="content">


<div class="crown">

♛

</div>


<div class="title">

表 彰 状

</div>


<div class="laurel">

❧　✦　❧

</div>


<div
id="awardView"
class="award"
>

優 勝

</div>


<div
id="recipientView"
class="recipient"
>

RED EAGLES 殿

</div>


<div
id="bodyView"
class="bodytext"
>
</div>


<div
id="tournamentView"
class="tournament"
>

NIJIGAKU SUMMER BASEBALL TOURNAMENT 2026

</div>


<div
id="dateView"
class="date"
>

2026年7月11日

</div>


<div class="issuer">

大会実行委員会

</div>


</div>


<div class="medal">

⚾

</div>


</div>


</section>


</main>



<script
src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
>
</script>


<script>


/* =========================
   DOM
========================= */


const awardType=
document.getElementById(
  'awardType'
);


const recipientInput=
document.getElementById(
  'recipientInput'
);


const recipientLabel=
document.getElementById(
  'recipientLabel'
);


const dateInput=
document.getElementById(
  'dateInput'
);


const tournamentInput=
document.getElementById(
  'tournamentInput'
);


const awardView=
document.getElementById(
  'awardView'
);


const recipientView=
document.getElementById(
  'recipientView'
);


const bodyView=
document.getElementById(
  'bodyView'
);


const tournamentView=
document.getElementById(
  'tournamentView'
);


const dateView=
document.getElementById(
  'dateView'
);


const certificate=
document.getElementById(
  'certificate'
);



/* =========================
   表彰項目
========================= */


const presets={


winner:{

  title:'優 勝',

  label:'チーム名',

  sample:'RED EAGLES',

  body:
`貴チームは本大会において
チーム一丸となり 卓越した力と不屈の精神を発揮し
見事 優勝という輝かしい成績を収められました
その栄誉を称え ここに表彰いたします`

},


teamMvp:{

  title:'チームMVP',

  label:'選手名',

  sample:'虹学 太郎',

  body:
`貴殿は本大会において
優勝チームの中で最も優れた成績を収め
チームの勝利に大きく貢献されました
その功績を称え ここに表彰いたします`

},


tournamentMvp:{

  title:'大会MVP',

  label:'選手名',

  sample:'虹学 太郎',

  body:
`貴殿は本大会において
大会を通じ最も優れた成績を収め
卓越した活躍をもって大会を彩られました
その栄誉を称え ここに表彰いたします`

},


hrKing:{

  title:'本 塁 打 王',

  label:'選手名',

  sample:'虹学 太郎',

  body:
`貴殿は本大会において
大会最多の本塁打を記録し
類まれなる打撃力を遺憾なく発揮されました
その輝かしい成績を称え ここに表彰いたします`

}


};



/* =========================
   日付
========================= */


function formatDate(value){


  if(!value){

    return '　　　年　　月　　日';

  }


  const d=
  new Date(
    value+
    'T00:00:00'
  );


  return (
    d.getFullYear()+
    '年'+
    (
      d.getMonth()+1
    )+
    '月'+
    d.getDate()+
    '日'
  );


}



/* =========================
   描画
========================= */


function render(){


  const p=
  presets[
    awardType.value
  ];


  awardView.textContent=
  p.title;


  recipientLabel.textContent=
  p.label;


  recipientView.textContent=
  (
    recipientInput
    .value
    .trim()
    ||
    '名称未設定'
  )
  +
  ' 殿';


  bodyView.textContent=
  p.body;


  tournamentView.textContent=
  tournamentInput
  .value
  .trim()
  ||
  '大会名';


  dateView.textContent=
  formatDate(
    dateInput.value
  );


}



/* =========================
   表彰項目変更
========================= */


awardType.onchange=()=>{


  const p=
  presets[
    awardType.value
  ];


  recipientLabel.textContent=
  p.label;


  recipientInput.value=
  p.sample;


  render();


};



/* =========================
   リアルタイム反映
========================= */


[
  recipientInput,
  dateInput,
  tournamentInput
]
.forEach(
  element=>{

    element.addEventListener(
      'input',
      render
    );

  }
);



/* =========================
   リセット
========================= */


document
.getElementById(
  'reset'
)
.onclick=()=>{


  awardType.value=
  'winner';


  recipientInput.value=
  'RED EAGLES';


  dateInput.value=
  '2026-07-11';


  tournamentInput.value=
  'NIJIGAKU SUMMER BASEBALL TOURNAMENT 2026';


  render();


};



/* =========================
   PNG保存
========================= */


document
.getElementById(
  'download'
)
.onclick=
async()=>{


  const btn=
  document.getElementById(
    'download'
  );


  btn.disabled=true;


  btn.textContent=
  '画像を作成中…';


  try{


    const canvas=
    await html2canvas(
      certificate,
      {

        scale:2,

        backgroundColor:null,

        useCORS:true

      }
    );


    const link=
    document.createElement(
      'a'
    );


    link.download=
    '表彰状_'
    +
    presets[
      awardType.value
    ]
    .title
    .replaceAll(
      ' ',
      ''
    )
    +
    '_'
    +
    (
      recipientInput
      .value
      .trim()
      ||
      '名称未設定'
    )
    +
    '.png';


    link.href=
    canvas.toDataURL(
      'image/png'
    );


    link.click();


  }catch(error){


    console.error(
      error
    );


    alert(
      '画像の保存に失敗しました'
    );


  }finally{


    btn.disabled=false;


    btn.textContent=
    'PNG画像として保存';


  }


};



/* =========================
   スマホ表示
========================= */


function fitPreview(){


  if(
    innerWidth<=900
  ){


    const available=
    Math.max(
      280,
      innerWidth-64
    );


    const scale=
    Math.min(
      1,
      available/1120
    );


    certificate.style.transform=
    `scale(${scale})`;


    certificate
    .parentElement
    .style
    .height=
    (
      792*
      scale+
      32
    )
    +
    'px';


  }else{


    certificate.style.transform=
    '';


    certificate
    .parentElement
    .style
    .height=
    '';


  }


}


addEventListener(
  'resize',
  fitPreview
);


render();

fitPreview();


</script>


</body>

</html>
